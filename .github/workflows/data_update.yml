name: Monthly Library Data Auto Update

on:
  schedule:
    - cron: '0 17 1 * *'
  workflow_dispatch:

# 💡 최신 Node.js 24 규칙에 어긋나지 않도록 글로벌 환경변수를 주입합니다.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run data update script
      env:
        LIBRARY_API_KEY: ${{ secrets.LIBRARY_API_KEY }}
      run: |
        python update_data.py

    - name: Commit and Push if data.json changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 자동 업데이트: 최신 도서 데이터 반영 ($(date +'%Y-%m-%d %H:%M:%S'))" && git push)
